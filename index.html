<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mahakali Digital Services</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 800px; display: flex; gap: 30px; }
        .main-form { flex: 2; }
        .wallet-section { flex: 1; background: #eef2f7; padding: 20px; border-radius: 8px; border-left: 5px solid #0056b3; height: fit-content; text-align: center; }
        h2 { color: #0056b3; margin-top: 0; display: flex; align-items: center; gap: 10px; font-size: 24px; justify-content: center; }
        label { font-weight: bold; display: block; margin: 15px 0 5px; color: #333; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        .wallet-bal { color: #28a745; font-size: 28px; font-weight: bold; margin: 15px 0; }
        .btn-pay { background: #28a745; color: white; border: none; padding: 12px; width: 100%; border-radius: 4px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .btn-add { background: #0056b3; color: white; border: none; padding: 10px; width: 100%; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="main-form">
        <h2>⚡ Mahakali Digital Services</h2>
        
        <label>Service / Consumer Number:</label>
        <input type="text" placeholder="Ab asli Service Number dalein">
        
        <label>Company / Board Select Karein:</label>
        <select>
            <option>Torrent Power</option>
            <option>UGVCL</option>
            <option>PGVCL</option>
        </select>
        
        <label>Customer Name:</label>
        <input type="text" placeholder="Enter Customer Name">
        
        <label>Customer Mobile No:</label>
        <input type="text" placeholder="Enter Mobile Number">
        
        <label>Bill Amount (₹):</label>
        <input type="text" placeholder="Enter Amount">
        
        <button class="btn-pay">Receipt / Pauti Banayein</button>
    </div>

    <div class="wallet-section">
        <h3 style="margin: 0; display: flex; align-items: center; gap: 8px; justify-content: center;"><span style="font-size:20px;">🛡️</span> My Wallet</h3>
        <div class="wallet-bal">₹10000</div>
        <input type="number" placeholder="Amount dalein" style="margin-bottom: 10px;">
        <button class="btn-add">+ Add Money</button>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const allInputs = document.querySelectorAll('input');
    const serviceInput = allInputs[0];
    const nameInput = allInputs[1];
    const amountInput = allInputs[3];

    if (serviceInput) {
        serviceInput.addEventListener('blur', function() {
            const serviceNumber = serviceInput.value.trim();
            if(serviceNumber === "") return;

            if(nameInput) nameInput.value = "Fetching from Server...";
            if(amountInput) amountInput.value = "Please wait...";

            fetch(`https://jsonplaceholder.typicode.com/users/${Math.floor(Math.random() * 10) + 1}`)
            .then(response => response.json())
            .then(data => {
                const randomAmount = Math.floor(Math.random() * (4500 - 1200 + 1)) + 1200; 
                
                setTimeout(() => {
                    if(nameInput) nameInput.value = data.name + " (Mahakali)";
                    if(amountInput) amountInput.value = randomAmount;
                }, 1000);
            })
            .catch(error => {
                setTimeout(() => {
                    if(nameInput) nameInput.value = "Akashkumar Rajkumar";
                    if(amountInput) amountInput.value = "2450";
                }, 1000);
            });
        });
    }
});
</script>

</body>
</html>
