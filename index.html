<!DOCTYPE html>
<html>
<head>
    <title>Mahakali Mobile</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .bill { border: 2px solid #000; padding: 20px; width: 300px; margin-bottom: 20px; }
        input { display: block; width: 100%; margin-bottom: 10px; padding: 8px; }
        button { padding: 10px; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

<div class="bill">
    <input type="text" id="cname" placeholder="Name">
    <input type="text" id="amt" placeholder="Amount">
    <button onclick="printBill()">Print Receipt</button>
</div>

<div id="receipt" style="display:none; border:1px solid #000; width:300px; padding:10px;">
    <h3>Mahakali Mobile</h3>
    <p>Name: <span id="outName"></span></p>
    <p>Amount: <span id="outAmt"></span></p>
    <button onclick="window.print()">CONFIRM PRINT</button>
</div>

<script>
function printBill() {
    document.getElementById('outName').innerText = document.getElementById('cname').value;
    document.getElementById('outAmt').innerText = document.getElementById('amt').value;
    document.getElementById('receipt').style.display = 'block';
}
</script>

</body>
</html>
