<!DOCTYPE html>
<html>
<head>
<style>
    body { font-family: sans-serif; padding: 20px; }
    .box { border: 1px solid #ccc; padding: 20px; width: 300px; }
    input { width: 100%; margin-bottom: 10px; }
</style>
</head>
<body>

<div class="box">
    <input type="text" id="cust" placeholder="Customer Name">
    <input type="text" id="amt" placeholder="Amount">
    <button onclick="printBill()">Print Receipt</button>
</div>

<script>
function printBill() {
    var n = document.getElementById('cust').value;
    var a = document.getElementById('amt').value;
    var w = window.open('', '', 'width=400,height=400');
    w.document.write('<h1>Bill</h1><p>Name: ' + n + '</p><p>Amount: ' + a + '</p><button onclick="window.print()">Print</button>');
    w.document.close();
}
</script>

</body>
</html>
