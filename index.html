<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mahakali Digital Services</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 800px; display: flex; gap: 30px; }
        .main-form { flex: 2; }
        .wallet-section { flex: 1; background: #eef2f7; padding: 20px; border-radius: 8px; border-left: 5px solid #0056b3; height: fit-content; text-align: center; }
        h2 { color: #0056b3; margin-top: 0; display: flex; align-items: center; gap: 10px; font-size: 24px; justify-content: center; }
        label { font-weight: bold; display: block; margin: 15px 0 5px; color: #333; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        .service-group { display: flex; gap: 10px; }
        .btn-fetch { background: #e67e22; color: white; border: none; padding: 10px 15px; border-radius: 4px; font-weight: bold; cursor: pointer; white-space: nowrap; font-size: 16px; display: inline-block; text-decoration: none; text-align: center; line-height: 20px; }
        .btn-fetch:hover { background: #d35400; }
        .wallet-bal { color: #28a745; font-size: 28px; font-weight: bold; margin: 15px 0; }
        .btn-pay { background: #28a745; color: white; border: none; padding: 12px; width: 100%; border-radius: 4px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .btn-pay:hover { background: #218838; }
        .btn-add { background: #0056b3; color: white; border: none; padding: 10px; width: 100%; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        /* Receipt display area inside page to avoid popup block */
        #receipt_output { display: none; margin-top: 20px; border: 2px dashed #000; padding: 15px; background: #fff; font-family: 'Courier New', monospace; }
        .receipt-btn-print { background: #0056b3; color: white; border: none; padding: 5px 15px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="main-form">
        <h2>⚡ Mahakali Digital Services</h2>
        
        <label>Service / Consumer Number:</label>
        <div class="service-group">
            <input type="text" id="service_no" placeholder="Enter Service Number" value="1339097">
            <a href="https://www.torrentpower.com" target="_blank" class="btn-fetch">⚡ Go to Torrent Power</a>
        </div>
        
        <label>Company / Board Select Karein:</label>
        <select id="board_select">
            <option value="Torrent Power">Torrent Power</option>
            <option value="UGVCL">UGVCL</option>
            <option value="PGVCL">PGVCL</option>
        </select>
        
        <label>Customer Name:</label>
        <input type="text" id="cust_name" placeholder="Asli Naam Yahan Likhein">
        
        <label>Customer Mobile No:</label>
        <input type="text" id="cust_mobile" placeholder="Enter Mobile Number">
        
        <label>Bill Amount (₹):</label>
        <input type="text" id="bill_amt" placeholder="Asli Amount Yahan Likhein">
        
        <button type="button" class="btn-pay" id="make_receipt_btn">Receipt / Pauti Banayein</button>

        <div id="receipt_output"></div>
    </div>

    <div class="wallet-section">
        <h3 style="margin: 0; display: flex; align-items: center; gap: 8px; justify-content: center;">🛡️ My Wallet</h3>
        <div class="wallet-bal">₹10000</div>
        <input type="number" placeholder="Amount dalein" style="margin-bottom: 10px;">
        <button class="btn-add">+ Add Money</button>
    </div>
</div>

<script>
document.getElementById('make_receipt_btn').addEventListener('click', () => {
    const serviceNo = document.getElementById('service_no').value.trim();
    const board = document.getElementById('board_select').value;
    const name = document.getElementById('cust_name').value.trim();
    const mobile = document.getElementById('cust_mobile').value.trim() || "N/A";
    const amount = document.getElementById('bill_amt').value.trim();

    if (serviceNo === "" || name === "" || amount === "") {
        alert("Kripya Consumer Number, Name aur Bill Amount poora bharein!");
        return;
    }

    const currentDateTime = new Date().toLocaleString('en-IN', { timeZone: 'Asia/Kolkata' });
    const receiptDiv = document.getElementById('receipt_output');

    // Generate receipt inside the page safely
    receiptDiv.innerHTML = `
        <div style="text-align: center; border-bottom: 1px dashed #000; padding-bottom: 10px; margin-bottom: 10px;">
            <h3 style="margin: 0;">🙏 MAHAKALI MOBILE 🙏</h3>
            <p style="margin: 2px 0; font-size: 12px;">Digital Transaction Hub</p>
            <p style="margin: 2px 0; font-size: 11px;">Date: ${currentDateTime}</p>
        </div>
        <div style="font-size: 13px; line-height: 1.6;">
            <div><b>Board:</b> ${board}</div>
            <div><b>Consumer No:</b> ${serviceNo}</div>
            <div><b>Customer Name:</b> ${name}</div>
            <div><b>Mobile No:</b> ${mobile}</div>
            <div style="color: green; font-weight: bold;"><b>Status:</b> SUCCESS</div>
            <div style="border-top: 1px dashed #000; margin-top: 5px; padding-top: 5px; font-size: 15px;">
                <b>PAID AMOUNT: ₹${amount}/-</b>
            </div>
        </div>
        <div style="text-align: center; margin-top: 10px;">
            <button class="receipt-btn-print" onclick="printReceipt()">🖨️ Print Pauti</button>
        </div>
    `;
    receiptDiv.style.display = "block";
});

function printReceipt() {
    const receiptContent = document.getElementById('receipt_output').innerHTML;
    const originalContent = document.body.innerHTML;
    
    // Temporarily replace page content to clean print only the bill
    document.body.innerHTML = `
        <div style="max-width: 400px; margin: 20px auto; padding: 20px; border: 1px solid #000; font-family: 'Courier New', monospace;">
            ${receiptContent}
        </div>
    `;
    // Hide the inner print button during hardware printing
    const internalBtn = document.querySelector('.receipt-btn-print');
    if(internalBtn) internalBtn.style.display = 'none';
    
    window.print();
    
    // Restore back the system
    document.body.innerHTML = originalContent;
    window.location.reload();
}
</script>

</body>
</html>
